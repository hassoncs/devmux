id: devmux
version: 1
project:
  id: devmux
  name: DevMux
  kind: tool
  lifecycle: active
  summary: tmux-based dev service orchestrator that gives humans and AI agents shared awareness of running services, preventing port conflicts and accidental restarts.
  owners:
    - id: chris
      role: owner
  tags:
    - devtools
    - tmux
    - services
    - cli
    - session-registry
    - health-first
    - idempotent-ensure
    - error-watching
  key_concepts:
    - tmux session registry
    - health-first detection
    - idempotent ensure
    - multi-worktree isolation
    - error watching
    - browser telemetry
  related_projects:
    - id: ch5-projects
      relationship: integrates-with
    - id: hush
      relationship: integrates-with
    - id: firefly-monorepo
      relationship: integrates-with
    - id: opencode-ecosystem
      relationship: integrates-with
    - id: automation-core
      relationship: integrates-with
  zoekt:
    enabled: true
  roots:
    - locator: .
      role: primary
  repos:
    - id: primary
      locator: .
      role: primary
  docs:
    - locator: README.md
      role: overview
    - locator: AGENTS.md
      role: agent-guide
  aliases:
    - devmux
    - dmx
